name: E2E CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - '.github/workflows/e2e-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'scripts/**'
      - '.github/workflows/e2e-ci.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dreamstream
          POSTGRES_USER: dreamstream
          POSTGRES_PASSWORD: dreamstream
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dreamstream -d dreamstream"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_URL: jdbc:postgresql://localhost:5432/dreamstream
      DB_USER: dreamstream
      DB_PASSWORD: dreamstream
      SERVER_PORT: 8080
      E2E_BASE_URL: http://127.0.0.1:8080/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build backend
        working-directory: backend
        run: mvn -q -DskipTests compile

      - name: Start backend
        working-directory: backend
        run: |
          mvn -q -DskipTests spring-boot:run > "$RUNNER_TEMP/dreamstream-backend.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/dreamstream-backend.pid"

      - name: Wait for backend
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Backend did not become ready."
          cat "$RUNNER_TEMP/dreamstream-backend.log"
          exit 1

      - name: Run e2e smoke test
        run: node scripts/e2e.mjs

      - name: Show backend log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/dreamstream-backend.log"

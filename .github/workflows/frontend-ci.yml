name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check frontend package.json exists
        id: frontend_check
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "frontend/package.json not found; skipping frontend CI."
          fi

      - name: Set up Node.js 22
        if: steps.frontend_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.frontend_check.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        if: steps.frontend_check.outputs.exists == 'true'
        working-directory: frontend
        run: npm test

      - name: Build frontend
        if: steps.frontend_check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build

<section class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">My Requests</h1>
      <p class="page-subtitle">Track the requests you created.</p>
    </div>

    <div class="actions">
      <a routerLink="/requests/new" class="primary-button">New request</a>
    </div>
  </div>

  <div *ngIf="loading" class="panel">Loading your requests...</div>

  <div *ngIf="!loading && requests.length === 0" class="panel empty-state">
    You have not created any requests yet.
  </div>

  <div class="panel table-wrap" *ngIf="!loading && requests.length > 0">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Updated</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let request of requests">
          <td>{{ request.title }}</td>
          <td><span [ngClass]="['badge', statusClass(request.status)]">{{ request.status }}</span></td>
          <td>{{ request.updatedAt || request.createdAt || '—' }}</td>
          <td class="actions">
            <a [routerLink]="['/requests', request.id]" class="text-button">View</a>
            <a [routerLink]="['/requests', request.id, 'edit']" class="text-button">Edit</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

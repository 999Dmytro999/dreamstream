<section class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Register</h1>
      <p class="page-subtitle">Create your DreamStream account.</p>
    </div>
  </div>

  <form class="panel form" (ngSubmit)="submit()">
    <div class="grid two">
      <div class="field">
        <label for="firstName">First name</label>
        <input id="firstName" name="firstName" [(ngModel)]="model.firstName" autocomplete="given-name" required />
      </div>

      <div class="field">
        <label for="lastName">Last name</label>
        <input id="lastName" name="lastName" [(ngModel)]="model.lastName" autocomplete="family-name" required />
      </div>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" [(ngModel)]="model.email" autocomplete="email" required />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="model.password"
        autocomplete="new-password"
        required
      />
    </div>

    <p *ngIf="error" class="empty-state">{{ error }}</p>

    <div class="actions">
      <button type="submit" class="primary-button" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Register' }}
      </button>
      <a routerLink="/login" class="secondary-button">Login</a>
    </div>
  </form>
</section>

<section class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Login</h1>
      <p class="page-subtitle">Sign in to manage your requests and offers.</p>
    </div>
  </div>

  <form class="panel form" (ngSubmit)="submit()">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" [(ngModel)]="model.email" autocomplete="email" required />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="model.password"
        autocomplete="current-password"
        required
      />
    </div>

    <p *ngIf="error" class="empty-state">{{ error }}</p>

    <div class="actions">
      <button type="submit" class="primary-button" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>
      <a routerLink="/register" class="secondary-button">Register</a>
    </div>
  </form>
</section>

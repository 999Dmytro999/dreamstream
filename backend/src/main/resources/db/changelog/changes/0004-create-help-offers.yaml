databaseChangeLog:
  - changeSet:
      id: 0004-create-help-offers
      author: codex
      changes:
        - createTable:
            tableName: help_offers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: help_request_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: offered_by
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: help_offers
            baseColumnNames: help_request_id
            referencedTableName: help_requests
            referencedColumnNames: id
            constraintName: fk_help_offers_help_request
        - addForeignKeyConstraint:
            baseTableName: help_offers
            baseColumnNames: offered_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_help_offers_offered_by

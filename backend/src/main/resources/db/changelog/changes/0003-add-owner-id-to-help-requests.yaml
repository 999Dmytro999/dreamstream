databaseChangeLog:
  - changeSet:
      id: 0003-add-owner-id-to-help-requests
      author: codex
      changes:
        - addColumn:
            tableName: help_requests
            columns:
              - column:
                  name: owner_id
                  type: UUID
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: help_requests
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_help_requests_owner_id

databaseChangeLog:
  - changeSet:
      id: 0001-initial-foundation
      author: codex
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
              - column:
                  name: last_name
                  type: VARCHAR(100)
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

  - include:
      file: db/changelog/changes/0002-create-help-requests.yaml

  - include:
      file: db/changelog/changes/0003-add-owner-id-to-help-requests.yaml

  - include:
      file: db/changelog/changes/0004-create-help-offers.yaml

  - include:
      file: db/changelog/changes/0005-auth-and-created-by.yaml

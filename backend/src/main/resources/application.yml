spring:
  application:
    name: dreamstream-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dreamstream}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:ZHJlYW1zdHJlYW0tZGV2LXNlY3JldC1kcmVhbXN0cmVhbS0yMDI2LTA0LTI2}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

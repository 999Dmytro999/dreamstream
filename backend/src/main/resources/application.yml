spring:
  application:
    name: dreamstream-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dreamstream}
    username: ${DB_USERNAME:dreamstream}
    password: ${DB_PASSWORD:dreamstream}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}
